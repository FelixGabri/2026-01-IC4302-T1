{{ if .Values.config.flask.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.config.flask.name }}
  labels:
    app: {{ .Values.config.flask.name }}
spec:
  replicas: {{ .Values.config.flask.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.config.flask.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.config.flask.name }}
    spec:
      containers:
      - name: {{ .Values.config.flask.name }}
        image: {{ .Values.config.flask.image }}
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: databases-redis
              key: redis-password
        - name: COUCH_USER
          value: "admin"
        - name: COUCH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: databases-couchdb
              key: adminPassword
        - name: ES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: ic4302-es-elastic-user
              key: elastic

        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: databases-postgresql
              key: postgres-password
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.config.flask.name }}
  labels:
    app: {{ .Values.config.flask.name }}
spec:
  type: NodePort
  selector:
    app: {{ .Values.config.flask.name }}
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30500
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ .Values.config.flask.name }}-monitor
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchLabels:
      app: {{ .Values.config.flask.name }}
  endpoints:
    - targetPort: 5000
      path: /metrics
      interval: 15s
{{ end }}